{{ define "main" }}
  <section class="not-found shell-narrow">
    <p class="eyebrow">404</p>
    <h1>{{ if eq .Lang "zh" }}页面不存在{{ else }}Page not found{{ end }}</h1>
    <p>{{ if eq .Lang "zh" }}这个链接可能已经移动，或者从未存在。{{ else }}The link may have moved, or the page may never have existed.{{ end }}</p>
    <a class="button button-primary" href="{{ .Site.Home.RelPermalink }}">{{ if eq .Lang "zh" }}返回首页{{ else }}Return home{{ end }}</a>
  </section>
{{ end }}
