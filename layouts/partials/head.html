<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
{{ $description := .Description | default .Summary | default .Site.Params.description }}
<meta name="description" content="{{ $description | plainify }}">
<meta name="author" content="{{ .Site.Params.authorLatin }}">
<link rel="canonical" href="{{ .Permalink }}">
{{ range .AllTranslations }}
  <link rel="alternate" hreflang="{{ .Language.Locale }}" href="{{ .Permalink }}">
{{ end }}
<link rel="alternate" hreflang="x-default" href="{{ .Site.Home.Permalink }}">
{{ with .OutputFormats.Get "rss" }}
  <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .RelPermalink }}">
{{ end }}
<script>
  (() => {
    const saved = localStorage.getItem('color-theme');
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.dataset.theme = saved || (systemDark ? 'dark' : 'light');
  })();
</script>
<link rel="stylesheet" href="{{ "vendor/katex/katex.min.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
<script defer src="{{ "vendor/katex/katex.min.js" | relURL }}"></script>
<script defer src="{{ "vendor/katex/contrib/auto-render.min.js" | relURL }}"></script>
<script defer src="{{ "js/main.js" | relURL }}"></script>
{{ if .IsHome }}
  <title>{{ .Site.Title }}</title>
{{ else }}
  <title>{{ .Title }} · {{ .Site.Params.authorLatin }}</title>
{{ end }}
