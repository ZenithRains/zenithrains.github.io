{{ define "main" }}
  {{ $writing := where .Site.RegularPages "Section" "in" .Site.Params.mainSections }}
  <header class="page-header shell">
    <h1>{{ .Title }}</h1>
  </header>

  <section class="shell content-section">
    {{ partial "article-list.html" (dict "pages" $writing.ByDate.Reverse "lang" .Lang "showSection" true) }}
  </section>
{{ end }}
